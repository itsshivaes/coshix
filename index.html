<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coshix CDN</title>

  <link rel="icon" href="https://cdn.coshix.in/Icons/cdn-logo.png">

  <style>
  :root{--bg:#fdf6f4;--card:#fff;--text:#2a1410;--muted:#8b5e57;--border:#f1d9d4;--primary:#8b2e2e}@media(prefers-color-scheme:dark){:root{--bg:#120a08;--card:#1a0f0c;--text:#f5e9e6;--muted:#c2a9a3;--border:#2a1a16;--primary:#b91c1c}}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}.header{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;backdrop-filter:blur(12px);background:color-mix(in srgb,var(--card) 90%,transparent);border-bottom:1px solid var(--border)}.left{display:flex;align-items:center;gap:10px}.back-btn{display:none;width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}.back-btn:hover{background:var(--primary);color:#fff}.brand{display:flex;align-items:center;gap:8px}.logo{width:26px;height:26px}.logo-text{font-weight:600;font-size:15px}.path{font-size:12px;color:var(--muted)}.container{padding:16px;flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;transition:.2s}.card:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.2)}.icon{font-size:26px;margin-bottom:8px}.name{font-size:13px}.size{font-size:11px;color:var(--muted);margin-top:4px}.footer{text-align:center;padding:12px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
  </style>
</head>

<body>

  <div class="header">
    <div class="left">

      <!-- Back Button (SVG centered) -->
      <button class="back-btn" id="backBtn" onclick="goBack()">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <!-- Brand -->
      <div class="brand">
        <img class="logo" src="https://cdn.coshix.in/Icons/cdn-logo.png">
        <span class="logo-text">Coshix CDN</span>
      </div>

    </div>

    <!-- Path -->
    <div class="path" id="path">/</div>
  </div>

  <!-- Files -->
  <div class="container">
    <div class="grid" id="fileList"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 Coshix CDN
  </div>

  <script>
const user="itsshivaes",repo="coshix",cdnBase="https://cdn.coshix.in/";let currentPath="",historyStack=[];function formatSize(b){if(!b)return"";if(b<1024)return b+" B";if(b<1048576)return(Math.round(b/102.4)/10)+" KB";return(Math.round(b/104857.6)/10)+" MB"}async function loadFiles(p=""){currentPath=p;try{const r=await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${p}`);const d=await r.json();if(!Array.isArray(d)){document.getElementById("fileList").innerHTML=`<p style="padding:20px;color:red">API limit reached 😢<br>Try again later</p>`;return}document.getElementById("path").innerText="/"+p;document.getElementById("backBtn").style.display=p?"flex":"none";const l=document.getElementById("fileList");l.innerHTML="";d.filter(i=>i.name!=="index.html"&&i.name!=="CNAME").forEach(i=>{const div=document.createElement("div");div.className="card";const f=i.type==="dir";div.innerHTML=`<div class="icon">${f?"📁":"📄"}</div><div class="name">${i.name}</div>${!f?`<div class="size">${formatSize(i.size)}</div>`:""}`;div.onclick=()=>{f?(historyStack.push(currentPath),loadFiles(i.path)):window.open(cdnBase+i.path,"_blank")};l.appendChild(div)})}catch(e){document.getElementById("fileList").innerHTML=`<p style="padding:20px;color:red">Error loading files ⚠️</p>`}}function goBack(){const p=historyStack.pop()||"";loadFiles(p)}loadFiles();
</script>

</body>
</html>
