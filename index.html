<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coshix CDN</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:#0b1120;
  color:#e2e8f0;
}

/* Header */
.header{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px 20px;
  backdrop-filter:blur(10px);
  background:rgba(15,23,42,0.7);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* Back button */
.back-btn{
  display:none;
  background:#1e293b;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}
.back-btn:hover{
  background:#334155;
}

/* Path */
.path{
  font-size:13px;
  opacity:0.7;
}

/* Container */
.container{
  padding:20px;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

/* Card */
.card{
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;
  padding:15px;
  cursor:pointer;
  transition:.2s;
}
.card:hover{
  transform:translateY(-3px);
  border-color:#334155;
}

/* Icons */
.icon{
  font-size:26px;
  margin-bottom:10px;
}
.folder{color:#38bdf8;}
.file{color:#94a3b8;}

.name{
  font-size:14px;
  word-break:break-word;
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">⬅ Back</button>
  <div class="path" id="path">/</div>
</div>

<div class="container">
  <div class="grid" id="fileList"></div>
</div>

<script>
const user = "itsshivaes";
const repo = "coshix";

let currentPath = "";
let historyStack = [];

async function loadFiles(path=""){
  currentPath = path;

  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`);
  const data = await res.json();

  document.getElementById("path").innerText = "/" + path;

  const backBtn = document.getElementById("backBtn");
  backBtn.style.display = path ? "inline-block" : "none";

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  data
    .filter(item => item.name !== "index.html") // hide index.html
    .forEach(item=>{
      const div = document.createElement("div");
      div.className = "card";

      const isFolder = item.type === "dir";

      div.innerHTML = `
        <div class="icon ${isFolder?'folder':'file'}">
          ${isFolder ? '📁' : '📄'}
        </div>
        <div class="name">${item.name}</div>
      `;

      div.onclick = ()=>{
        if(isFolder){
          historyStack.push(currentPath);
          loadFiles(item.path);
        }else{
          window.open(item.download_url, "_blank");
        }
      };

      list.appendChild(div);
    });
}

function goBack(){
  const prev = historyStack.pop() || "";
  loadFiles(prev);
}

loadFiles();
</script>

</body>
</html>
