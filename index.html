<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Coshix CDN</title><link rel="icon" href="https://cdn.coshix.in/Icons/cdn-logo.png"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;background:#0b1120;color:#e2e8f0;display:flex;flex-direction:column;min-height:100vh}.header{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:15px 20px;backdrop-filter:blur(10px);background:rgba(15,23,42,0.7);border-bottom:1px solid rgba(255,255,255,.05)}.left{display:flex;align-items:center;gap:10px}.back-btn{display:none;background:#1e293b;border:none;padding:6px 12px;border-radius:8px;color:#fff;cursor:pointer}.back-btn:hover{background:#334155}.brand{display:flex;align-items:center;gap:8px}.logo-svg{width:20px;height:20px}.logo-text{font-weight:600;font-size:15px}.path{font-size:13px;opacity:.7}.container{padding:20px;flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}.card{background:#0f172a;border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:15px;cursor:pointer;transition:.2s}.card:hover{transform:translateY(-3px);border-color:#334155}.icon{font-size:26px;margin-bottom:10px}.folder{color:#38bdf8}.file{color:#94a3b8}.name{font-size:14px;word-break:break-word}.footer{text-align:center;padding:15px;font-size:12px;opacity:.6;border-top:1px solid rgba(255,255,255,.05)}</style></head><body><div class="header"><div class="left"><button class="back-btn" id="backBtn" onclick="goBack()">⬅ Back</button><div class="brand"><svg class="logo-svg" viewBox="0 0 1500 1500"><path fill="#38bdf8" d="M388.6 887.8l-31.8-40.4c-80.4-102.3-46.1-252.7 70.6-310l515-253v104.1c0 79.7-45.5 152.4-117.1 187.3L483 742.6c-24.9 12.1-46.7 29.9-63.2 52.2-16.5 22.4-30.8 53.1-29.7 91.8 11.3-9 23.8-16.9 37.4-23.6l515-253v104.2c0 79.7-45.5 152.4-117.1 187.3L483 1068.3c-24.9 12.1-46.7 29.9-63.2 52.2-17 23-31.6 54.8-29.5 95l-33.4-42.5c-70.7-89.9-52.8-216.9 31.7-285.3z"/></svg><span class="logo-text">Coshix CDN</span></div></div><div class="path" id="path">/</div></div><div class="container"><div class="grid" id="fileList"></div></div><div class="footer">© 2026 Coshix CDN • All rights reserved</div><script>const user="itsshivaes",repo="coshix",cdnBase="https://cdn.coshix.in/";let currentPath="",historyStack=[];async function loadFiles(path=""){currentPath=path;const res=await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`),data=await res.json();document.getElementById("path").innerText="/"+path;const backBtn=document.getElementById("backBtn");backBtn.style.display=path?"inline-block":"none";const list=document.getElementById("fileList");list.innerHTML="";data.filter(item=>item.name!=="index.html"&&item.name!=="CNAME").forEach(item=>{const div=document.createElement("div");div.className="card";const isFolder=item.type==="dir";div.innerHTML=`<div class="icon ${isFolder?"folder":"file"}">${isFolder?"📁":"📄"}</div><div class="name">${item.name}</div>`;div.onclick=()=>{isFolder?(historyStack.push(currentPath),loadFiles(item.path)):window.open(cdnBase+item.path,"_blank")};list.appendChild(div)})}function goBack(){const prev=historyStack.pop()||"";loadFiles(prev)}loadFiles();</script></body></html>
